name: CI/CD - Build, Push to ECR & Deploy to ECS

on:

 workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:   ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  ECS_CLUSTER:  ecs-microservices-cluster

jobs:
  # ─────────────────────────────────────────────────
  # JOB 1 — Build & Push Docker images to ECR
  # ─────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Frontend image
        run: |
          docker build -t $ECR_REGISTRY/ecs-microservices-frontend:${{ github.sha }} ./app/frontend
          docker push    $ECR_REGISTRY/ecs-microservices-frontend:${{ github.sha }}
          docker tag     $ECR_REGISTRY/ecs-microservices-frontend:${{ github.sha }} \
                         $ECR_REGISTRY/ecs-microservices-frontend:latest
          docker push    $ECR_REGISTRY/ecs-microservices-frontend:latest

      - name: Build & push Backend image
        run: |
          docker build -t $ECR_REGISTRY/ecs-microservices-backend:${{ github.sha }} ./app/backend
          docker push    $ECR_REGISTRY/ecs-microservices-backend:${{ github.sha }}
          docker tag     $ECR_REGISTRY/ecs-microservices-backend:${{ github.sha }} \
                         $ECR_REGISTRY/ecs-microservices-backend:latest
          docker push    $ECR_REGISTRY/ecs-microservices-backend:latest

  # ─────────────────────────────────────────────────
  # JOB 2 — Deploy to ECS (only on main branch)
  # ─────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy Frontend to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ecs-microservices-frontend-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Backend to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ecs-microservices-backend-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Frontend deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ecs-microservices-frontend-service \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Backend deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ecs-microservices-backend-service \
            --region ${{ env.AWS_REGION }}

      - name: Verify running tasks
        run: |
          echo "=== Frontend Tasks ==="
          aws ecs list-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service-name ecs-microservices-frontend-service

          echo "=== Backend Tasks ==="
          aws ecs list-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service-name ecs-microservices-backend-service
